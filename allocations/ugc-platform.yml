single_writer_files:
  # Files that only one section may edit at a time. The held_by value is an
  # epic key (matches model_registry.pending or flyway.reserved entries).
  # held_by: none means the file is currently unlocked — sections may grab
  # a short-lived lock per edit.
  - file: services/ugc-api/src/main/kotlin/com/syndigo/ugc/ai/ModelRegistry.kt
    held_by: GDI-708
    until: "2026-05-14T18:05:17Z"
    reason: reserved via reserve.sh
  - file: services/ugc-api/src/main/kotlin/com/syndigo/ugc/ai/Prompts.kt
    held_by: GDI-708
    until: "2026-05-14T18:05:15Z"
    reason: reserved via reserve.sh
  - file: docs/decisions.md
    held_by: none
    note: Append-safe at the section level — each section appends ADR-X-NNN entries
  - file: docs/gameplan.md
    held_by: none
    note: Section-scoped headings; conflicts rare
  - file: .claude/pipeline-learnings.md
    held_by: none
    note: |
      Append-safe — each retro appends its own block at end-of-file. The
      Retro Aggregator (FOLLOW-UP) will dedup on a schedule.
  - file: .claude/CLAUDE.md
    held_by: none
    note: Rarely touched. Lock per-edit; release on commit.
