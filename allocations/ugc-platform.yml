# =====================================================================
# UGC Platform — Allocation Registry
# =====================================================================
# This is the live coordination state for the syndigo/ugc-platform repo.
# Sessions read this before starting work and write to it via the scripts
# under ../scripts/. The file is structured for safe parallel edits at the
# section level: Section A never edits Section C's entries, and vice versa.
#
# Six top-level sections (required by schemas/allocation.yml.schema.json):
#   - product            (identity)
#   - flyway             (DB migration version reservations)
#   - model_registry     (AI model surfaces — names + versions)
#   - single_writer_files (files that only one section may edit at a time)
#   - releases           (current main + per-section next semver)
#   - anchor_dependencies (cross-section blocking relationships)
#   - tfc_deploy_queue   (forward-looking; Day-1 stub only)
#
# As of 2026-05-12. Verified against syndigo/ugc-platform release tags and
# the live parallel-session message contexts at hand-off time.

