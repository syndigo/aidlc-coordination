single_writer_files:
  # Files that only one section may edit at a time. The held_by value is an
  # epic key (matches model_registry.pending or flyway.reserved entries).
  # held_by: none means the file is currently unlocked — sections may grab
  # a short-lived lock per edit.
  #
  # ⚠ GDI-692 retro (2026-05-13): the locks on ModelRegistry.kt + Prompts.kt
  # + ModelRegistryTest.kt are LOAD-BEARING. They look "append-safe" because
  # each new AI surface adds an entry at end-of-section, but git auto-merge
  # FAILS when two parallel sessions append in the same adjacent line region
  # (the when-clause body, the enum entry list, the test fixture block, the
  # `containsExactlyInAnyOrder(...)` argument list). Both Section A's GDI-699
  # and Section C's GDI-692 hit this exact conflict on 2026-05-13.
  #
  # DO NOT release these locks as a "false-positive mitigation." The WAIT
  # they trigger when another section is editing is the correct behavior —
  # it forces serialization on a real conflict surface. The lock holds the
  # ENTIRE file for the duration of the edit, even though only ~3 lines
  # within it change.
  # Path corrected 2026-05-13 (FR-A.1.12 pre-flight discovery): the registry
  # tracked these as `ai/ModelRegistry.kt` and `ai/Prompts.kt` but the actual
  # files live under `ai/governance/` and `ai/prompt/` subpackages. The stale
  # path caused `conflict-check.sh --files-to-touch <real-path>` to return a
  # false-positive GO when the locks were held — yq matched on nothing.
  # Both `single_writer_files[].file` and `aidlc/shared/profiles/ugc-platform.yml
  # coordination.touch_patterns[].file` updated in lockstep.
  - file: services/ugc-api/src/main/kotlin/com/syndigo/ugc/ai/governance/ModelRegistry.kt
    held_by: GDI-1389
    until: "2026-05-20T18:26:33Z"
    reason: reserved via reserve.sh
    append_list_conflict_class: true # GDI-692 retro: locks are LOAD-BEARING here
  - file: services/ugc-api/src/main/kotlin/com/syndigo/ugc/ai/prompt/Prompts.kt
    held_by: GDI-1389
    until: "2026-05-20T18:26:36Z"
    reason: reserved via reserve.sh
    append_list_conflict_class: true # GDI-692 retro: locks are LOAD-BEARING here
  - file: services/ugc-api/src/test/kotlin/com/syndigo/ugc/ai/governance/ModelRegistryTest.kt
    held_by: none
    note: |
      ⚠ GDI-692 retro: ALSO load-bearing append-list conflict class. Test
      fixtures (e.g., `containsExactlyInAnyOrder(...)`, `hasSize(N)`, per-
      surface stubs in `stubAllPrompts()`) collide on the same lines when
      two sessions add surfaces concurrently. Any reservation against
      ModelRegistry.kt SHOULD also reserve this file (paired lock).
    append_list_conflict_class: true
    until: "2026-05-18T18:09:16Z"
    reason: released via release.sh --all-for-epic
