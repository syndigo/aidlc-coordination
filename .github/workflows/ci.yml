name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint==1.35.1
      - name: Lint YAML
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            allocations/ profiles/ .github/workflows/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck --severity=warning scripts/*.sh

  schema-validate:
    name: schema-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3
      - name: Install yq v4
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Convert YAML to JSON for ajv (preserves timestamp strings)
        run: |
          for f in allocations/*.yml profiles/*.yml; do
            [ -f "$f" ] && yq -o=json '.' "$f" > "$f.json"
          done
      - name: Validate allocations against schema
        run: |
          for f in allocations/*.yml.json; do
            ajv validate -s schemas/allocation.yml.schema.json -d "$f" --all-errors -c ajv-formats
          done
      - name: Validate profiles against schema (D-017)
        run: |
          if [ -d profiles ] && ls profiles/*.yml.json >/dev/null 2>&1; then
            for f in profiles/*.yml.json; do
              ajv validate -s schemas/profile.yml.schema.json -d "$f" --all-errors -c ajv-formats
            done
          else
            echo "No profiles to validate (skipping)."
          fi

  markdown-structure:
    name: markdown-structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          set -e
          for f in README.md bootstrap-log.md \
                   docs/parallel-session-playbook.md \
                   docs/how-it-works.md \
                   docs/decisions.md \
                   docs/orchestration-tiers.md \
                   personas/section-owner.md \
                   personas/release-coordinator.md \
                   personas/compliance-reviewer.md \
                   personas/retro-aggregator.md \
                   personas/pillar-orchestrator.md \
                   personas/portfolio-orchestrator.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required docs present."

  yq-smoke:
    name: yq-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq v4
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Run status.sh
        run: |
          chmod +x scripts/*.sh
          ./scripts/status.sh --product ugc-platform || true

      - name: Run pillar-status.sh + portfolio-status.sh (D-016)
        run: |
          # Smoke test the orchestrator-tier read-only scripts.
          # Both must exit 0 against the seeded UGC pillars block.
          ./scripts/pillar-status.sh --letter A
          ./scripts/portfolio-status.sh
          ./scripts/pillar-status.sh --letter B --json | python3 -m json.tool > /dev/null
          ./scripts/portfolio-status.sh --json | python3 -m json.tool > /dev/null

      - name: --json round-trip smoke (GDI-669 retro #1)
        run: |
          # Every script that supports --json must emit parseable JSON on both
          # GO and WAIT paths. This catches the yq --arg defect class at PR
          # time, not at Stage 7. See .claude/pipeline-learnings.md GDI-669 #1.
          set -e
          echo "--- conflict-check.sh --json (GO path: Section A self-hold) ---"
          ./scripts/conflict-check.sh --section A --fr A.1.9 \
            --files-to-touch ModelRegistry.kt --json 2>/dev/null \
            | python3 -m json.tool
          echo "--- conflict-check.sh --json (WAIT path: Section C collision) ---"
          ./scripts/conflict-check.sh --section C --fr C.1.11 \
            --files-to-touch ModelRegistry.kt --json 2>/dev/null \
            | python3 -m json.tool || {
              echo "WAIT-path JSON must still be parseable (exit 1 is correct)"
              # The script exits 1 on WAIT but JSON on stdout must parse.
              ./scripts/conflict-check.sh --section C --fr C.1.11 \
                --files-to-touch ModelRegistry.kt --json 2>/dev/null \
                | python3 -c "import json, sys; json.loads(sys.stdin.read())"
            }
          echo "--- status.sh --json ---"
          ./scripts/status.sh --product ugc-platform --json 2>/dev/null \
            | python3 -m json.tool > /dev/null
          echo "All --json round-trips parseable."
